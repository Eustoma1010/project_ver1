{% extends 'base.html' %}
{% block title %}Đang chờ duyệt nông trại{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto mt-12 p-8 bg-card rounded-2xl shadow-xl hover:shadow-2xl transition-shadow backdrop-blur-md">
  <h2 class="text-2xl font-bold mb-4 text-primary">Đợi duyệt</h2>
  <p class="mb-2">Nông trại của bạn <strong>{{ farm.name }}</strong> đang chờ quản trị viên duyệt.</p>
  <p>Vui lòng kiên nhẫn, chúng tôi sẽ thông báo khi đã được duyệt.</p>
  <div class="mt-6 flex justify-center">
    <svg class="animate-spin h-8 w-8 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
    </svg>
  </div>
</div>
{% endblock %}
