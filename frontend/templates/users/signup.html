{% extends "base.html" %}

{% block title %}Đăng Ký Tài Khoản - Verdant{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12 px-4">
    <div class="bg-white border border-border rounded-3xl p-8 shadow-xl">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold font-display text-foreground">Tạo Tài Khoản Mới</h2>
            <p class="text-xs text-muted-foreground mt-1">Kết nối thẳng từ nông trại sạch tới mâm cơm gia đình</p>
        </div>

        <form method="POST" action="{% url 'users:signup' %}" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold text-muted-foreground uppercase mb-1">Tên đăng nhập</label>
                <input 
                    type="text" 
                    name="username" 
                    required 
                    placeholder="Nhập tên đăng nhập" 
                    class="w-full border border-border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
                >
            </div>
            
            <div>
                <label class="block text-xs font-bold text-muted-foreground uppercase mb-1">Email</label>
                <input 
                    type="email" 
                    name="email" 
                    required 
                    placeholder="Nhập địa chỉ email" 
                    class="w-full border border-border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
                >
            </div>

            <div>
                <label class="block text-xs font-bold text-muted-foreground uppercase mb-1">Mật khẩu</label>
                <input 
                    type="password" 
                    name="password" 
                    required 
                    placeholder="Tạo mật khẩu" 
                    class="w-full border border-border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
                >
            </div>
            <div>
                <label class="block text-xs font-bold text-muted-foreground uppercase mb-1">Vai trò tài khoản</label>
                <select name="role" class="w-full border border-border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary">
                    <option value="BUYER">Người mua (Khách hàng)</option>
                    <option value="FARMER">Nông dân (Nhà cung cấp)</option>
                    <option value="AUDITOR">Kiểm định viên (Bên thứ ba / Auditor)</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-muted-foreground uppercase mb-1">Số điện thoại</label>
                <input 
                    type="text" 
                    name="phone_number" 
                    placeholder="Nhập số điện thoại (tùy chọn)" 
                    class="w-full border border-border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
                >
            </div>

            <div>
                <label class="block text-xs font-bold text-muted-foreground uppercase mb-1">Địa chỉ giao hàng mặc định</label>
                <textarea 
                    name="address" 
                    rows="2" 
                    placeholder="Nhập địa chỉ giao hàng của bạn (tùy chọn)" 
                    class="w-full border border-border rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary"
                ></textarea>
            </div>

            <button 
                type="submit" 
                class="w-full bg-primary hover:bg-primary-hover text-white font-bold py-2.5 rounded-full text-sm transition mt-6 shadow-md shadow-primary/25"
            >
                Đăng Ký Tài Khoản
            </button>
        </form>

        <div class="border-t border-border mt-6 pt-4 text-center">
            <p class="text-xs text-muted-foreground">
                Đã có tài khoản? 
                <a href="{% url 'users:login' %}" class="text-primary font-bold hover:underline">Đăng nhập</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
